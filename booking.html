<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Call - 360° Builds</title>
    <link rel="stylesheet" href="styles.css">

    <!-- Meta Pixel Code -->

    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');

    <noscript>

        src="https://www.facebook.com/tr?id=854197977632425&ev=PageView&noscript=1"/>

</head>
<body>
    <div class="app-container">
        <header class="simple-header">
            <div class="logo-text">
                <a href="index.html" style="text-decoration:none;color:inherit;">
                    <span class="logo-number">360</span><span class="logo-degree">&deg;</span>
                    <span class="logo-divider"></span>
                    <span class="logo-word">Builds</span>
                </a>
            </div>
        </header>

        <section class="hero-text">
            <p class="hero-eyebrow">One Last Step</p>
            <h1 class="hero-headline">Pick a Time &mdash;<br>We&rsquo;ll Do the Rest</h1>
        </section>

        <main class="booking-container">
            <div class="booking-split-wrapper">

                <!-- Left: Form -->
                <div class="booking-form-side">
                    <h2 class="step-title">Your Details</h2>
                    <p class="step-subtitle">Enter your info to secure your spot.</p>
                    <form id="bookingForm">
                        <div class="form-group">
                            <label for="userName" class="field-label">Full Name</label>
                            <input type="text" id="userName" name="userName" placeholder="Your Name" required class="text-input">
                        </div>
                        <div class="form-group">
                            <label for="userPhone" class="field-label">Phone Number</label>
                            <input type="tel" id="userPhone" name="userPhone" placeholder="(555) 000-0000" required class="text-input">
                        </div>
                        <div class="selected-info" id="selectedInfo">
                            <p><strong>Selected:</strong> <span id="displayDateTime">Please select a date and time</span></p>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Confirm Booking</button>
                        <a href="index.html" class="back-link">← Back to questions</a>
                    </form>
                </div>

                <!-- Right: Calendar -->
                <div class="booking-calendar-side">
                    <div class="calendar-section-title">Pick a Date</div>
                    <div class="calendar-header">
                        <h2 id="currentMonthYear"></h2>
                    </div>
                    <div class="calendar-widget">
                        <div class="calendar-days-header">
                            <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
                        </div>
                        <div class="calendar-grid" id="calendarGrid"></div>
                    </div>
                    <div class="time-slots-container" id="timeSlotsContainer">
                        <h3 class="field-label">Available Times</h3>
                        <div class="time-grid" id="timeGrid">
                            <p class="empty-msg">Select a date to see times</p>
                        </div>
                    </div>
                </div>

            </div>
        </main>

        <footer class="simple-footer">
            <p>&copy; 2026 360&deg; Builds. All rights reserved.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
