<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360° Builds - Get Started</title>
    <link rel="stylesheet" href="styles.css">

    <!-- Meta Pixel Code -->

    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',

</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="simple-header">
            <div class="logo-text">
                <span class="logo-number">360</span><span class="logo-degree">&deg;</span>
                <span class="logo-divider"></span>
                <span class="logo-word">Builds</span>
            </div>
        </header>

        <!-- Main Form Section -->
        <main class="question-container">
            <div class="form-wrapper">

                <!-- Progress Bar -->
                <div class="progress-container">
                    <div class="progress-bar-bg">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                    <p class="progress-text">
                        Step <span id="currentStep">1</span> of 
                        <span id="totalSteps">2</span>
                    </p>
                </div>

                <form id="applicationForm" class="multi-step-form">

                    <!-- Step 1 -->
                    <div class="form-step active" id="step1">
                        <h1 class="step-title">How many homes do you build per year?</h1>

                        <div class="form-group">
                            <div class="radio-group">
                                <label class="radio-card">
                                    <input type="radio" name="homesPerYear" value="1-5" required>
                                    <span class="radio-label">1-5</span>
                                </label>
                                <label class="radio-card">
                                    <input type="radio" name="homesPerYear" value="6-10" required>
                                    <span class="radio-label">6-10</span>
                                </label>
                                <label class="radio-card">
                                    <input type="radio" name="homesPerYear" value="11-20" required>
                                    <span class="radio-label">11-20</span>
                                </label>
                                <label class="radio-card">
                                    <input type="radio" name="homesPerYear" value="21+" required>
                                    <span class="radio-label">21+</span>
                                </label>
                            </div>
                        </div>

                        <button type="button" class="btn btn-primary btn-block next-btn">
                            Next Question
                        </button>
                    </div>

                    <!-- Step 2 -->
                    <div class="form-step" id="step2">
                        <h1 class="step-title">
                            Do you currently use virtual tours or 3D walkthroughs for your listings?
                        </h1>

                        <div class="form-group">
                            <div class="radio-group">
                                <label class="radio-card">
                                    <input type="radio" name="currentTours" value="Yes" required>
                                    <span class="radio-label">Yes, we already do</span>
                                </label>
                                <label class="radio-card">
                                    <input type="radio" name="currentTours" value="No-Interested" required>
                                    <span class="radio-label">No, but interested</span>
                                </label>
                                <label class="radio-card">
                                    <input type="radio" name="currentTours" value="No-Not-Interested" required>
                                    <span class="radio-label">No, not interested</span>
                                </label>
                            </div>
                        </div>

                        <div class="form-buttons">
                            <button type="button" class="btn btn-secondary prev-btn">
                                Back
                            </button>
                            <button type="button" class="btn btn-primary" id="bookCallBtn">
                                Continue
                            </button>
                        </div>
                    </div>

                </form>
            </div>
        </main>

        <footer class="simple-footer">
            <p>&copy; 2026 360&deg; Builds. All rights reserved.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
