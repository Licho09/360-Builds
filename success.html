<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed - 360° Builds</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- Meta Pixel Code -->
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '854197977632425');
    fbq('track', 'PageView');
    fbq('track', 'Schedule');
    </script>
    <noscript>
        <img height="1" width="1" style="display:none"
        src="https://www.facebook.com/tr?id=854197977632425&ev=PageView&noscript=1"/>
    </noscript>
    <!-- End Meta Pixel Code -->

</head>
<body>
    <div class="app-container">
        <header class="simple-header">
            <div class="logo-text"><a href="index.html" style="text-decoration: none; color: inherit;">360° Builds</a></div>
        </header>

        <main class="question-container">
            <div class="form-wrapper" style="text-align: center;">
                <div style="font-size: 4rem; margin-bottom: 1rem;">✅</div>
                <h1 class="step-title">Thank You!</h1>
                <p class="step-subtitle">Your booking has been confirmed.</p>
                
                <div class="selected-info" style="text-align: left; margin-top: 2rem;">
                    <p><strong>Name:</strong> <span id="confName">---</span></p>
                    <p><strong>Phone:</strong> <span id="confPhone">---</span></p>
                    <p><strong>Appointment:</strong> <span id="confDateTime">---</span></p>
                </div>

                <p style="margin-top: 2rem; color: var(--text-muted);">We have received your information and will contact you shortly to prepare for our call.</p>
                
                <a href="index.html" class="btn btn-primary btn-block" style="margin-top: 2rem; text-decoration: none;">Return Home</a>
            </div>
        </main>

        <footer class="simple-footer">
            <p>&copy; 2026 360° Builds. All rights reserved.</p>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Retrieve data from localStorage for display
            const lastBooking = JSON.parse(localStorage.getItem('lastBooking') || '{}');
            if (lastBooking.name) {
                document.getElementById('confName').textContent = lastBooking.name;
                document.getElementById('confPhone').textContent = lastBooking.phone;
                document.getElementById('confDateTime').textContent = lastBooking.dateTime;
            }

            // Confetti Blast
            var count = 200;
            var defaults = {
              origin: { y: 0.7 }
            };

            function fire(particleRatio, opts) {
              confetti(Object.assign({}, defaults, opts, {
                particleCount: Math.floor(count * particleRatio)
              }));
            }

            fire(0.25, {
              spread: 26,
              startVelocity: 55,
            });
            fire(0.2, {
              spread: 60,
            });
            fire(0.35, {
              spread: 100,
              decay: 0.91,
              scalar: 0.8
            });
            fire(0.1, {
              spread: 120,
              startVelocity: 25,
              decay: 0.92,
              scalar: 1.2
            });
            fire(0.1, {
              spread: 120,
              startVelocity: 45,
            });
        });
    </script>
</body>
</html>
